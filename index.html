<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
            text-align: center;
        }
        header {
            background-color: #2563eb;
            color: white;
            padding: 2.5rem 1rem;
        }
        main {
            padding: 2rem 1rem;
        }
        .card {
            background: white;
            padding: 1.5rem;
            margin: 1rem auto;
            max-width: 500px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 {
            margin: 0 0 10px 0;
            font-size: 1.8rem;
        }
        p {
            font-size: 1rem;
            color: #555;
        }
        header p {
            color: #e0e7ff;
        }
    </style>
</head>
<body>
    <header>
        <h1>My Assignment Project</h1>
        <p>Created using AI & Hosted on GitHub Pages</p>
    </header>
    <main>
        <div class="card">
            <h2>Welcome to My Website</h2>
            <p>This website was created as part of my assignment task using AI tools and deployed via GitHub Pages.</p>
        </div>
    </main>
</body>
</html>
